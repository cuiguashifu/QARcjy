<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>登录/注册 - QAR 安全系统</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="container" style="min-height:100%;display:flex;align-items:center;justify-content:center">
      <div class="card" style="width:480px;max-width:92vw">
        <div class="card-h">
          <div class="h1">欢迎使用 QAR 安全系统</div>
          <div class="muted">登录后可加密上传并按权限解密下载</div>
        </div>
        <div class="tabs" style="margin-top:12px">
          <div class="tab active" id="tab-login">登录</div>
          <div class="tab" id="tab-register">注册</div>
        </div>
        <div class="card-b">
          <div id="logged-in" style="display:none" class="col">
            <div class="badge ok" id="me-badge">已登录</div>
            <div class="row">
              <a class="btn primary" href="/workbench">前往工作台</a>
              <button class="btn" id="btn-logout">退出登录</button>
            </div>
          </div>

          <div id="panel-login" class="col">
            <div class="col">
              <div class="label">学号/工号</div>
              <input class="input" id="login-username" autocomplete="username" placeholder="例如：20260001" />
            </div>
            <div class="col">
              <div class="label">密码</div>
              <input class="input" id="login-password" type="password" autocomplete="current-password" />
            </div>
            <button class="btn primary" id="btn-login">登录</button>
          </div>

          <div id="panel-register" class="col" style="display:none">
            <div class="col">
              <div class="label">学号/工号</div>
              <input class="input" id="reg-username" autocomplete="username" placeholder="必须与档案库一致" />
            </div>
            <div class="col">
              <div class="label">姓名</div>
              <input class="input" id="reg-fullname" autocomplete="name" placeholder="必须与档案库一致" />
            </div>
            <div class="col">
              <div class="label">身份证后四位</div>
              <input class="input" id="reg-idlast4" inputmode="numeric" maxlength="4" placeholder="例如：1234" />
            </div>
            <div class="col">
              <div class="label">联系方式</div>
              <input class="input" id="reg-contact" inputmode="tel" placeholder="手机号/座机/邮箱" />
            </div>
            <div class="col">
              <div class="label">航司</div>
              <input class="input" id="reg-airline" placeholder="例如：CAUC" />
            </div>
            <div class="col">
              <div class="label">所属职位</div>
              <input class="input" id="reg-position" placeholder="例如：机长/副驾驶/签派员" />
            </div>
            <div class="col">
              <div class="label">所属部门</div>
              <input class="input" id="reg-dept" placeholder="例如：飞行一部" />
            </div>
            <div class="col">
              <div class="label">设置密码</div>
              <input class="input" id="reg-password" type="password" autocomplete="new-password" />
            </div>
            <div class="col">
              <div class="label">确认密码</div>
              <input class="input" id="reg-password2" type="password" autocomplete="new-password" />
            </div>
            <button class="btn primary" id="btn-register">提交申请</button>
            <div class="muted">提交后需管理员审核通过才会创建账号</div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="t">提示</div>
      <div class="m"></div>
    </div>

    <script src="/assets/common.js"></script>
    <script src="/assets/auth.js"></script>
  </body>
</html>

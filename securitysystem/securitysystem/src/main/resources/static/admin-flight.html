<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>飞行数据管理 - QAR 安全系统</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <link rel="stylesheet" href="/assets/page-animations.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/webgl/three.min.js"></script>
    <script src="/assets/webgl/Detector.js"></script>
    <script src="/assets/clouds.js"></script>
    <script src="/assets/sakura.js"></script>
    <script src="/assets/sidebar.js"></script>
    <script src="/assets/snap.svg-min.js"></script>
    <script src="/assets/svgLoader.js"></script>
    <script src="/assets/page-transition.js?v=4"></script>
    <script src="/assets/classie.js?v=2"></script>
    <script src="/assets/sidebarEffects.js?v=2"></script>
    <style>
      .filters { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-end; flex-wrap: wrap; }
      .filters .col { display: flex; flex-direction: column; gap: 4px; }
      .table th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 20px; }
      .table th.sortable:after { content: '↕'; position: absolute; right: 4px; opacity: 0.3; }
      .table th.sortable.asc:after { content: '↑'; opacity: 1; }
      .table th.sortable.desc:after { content: '↓'; opacity: 1; }
      .row-input { width: 100%; min-height: 120px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body>
    <div id="st-container" class="st-container">
      <!-- 侧边栏 -->
      <nav class="st-menu st-effect-12" id="menu-12">
        <h2>QAR 安全系统</h2>
        <ul class="sidebar-menu">
          <li>
            <a href="/workbench">
              <i class="fa fa-dashboard"></i> 工作台
            </a>
          </li>
          <li>
            <a href="/feedback">
              <i class="fa fa-envelope"></i> 反馈与联系
            </a>
          </li>
          <li class="active">
            <a href="#">
              <i class="fa fa-cogs"></i> 管理后台
              <i class="fa fa-angle-down"></i>
            </a>
            <ul class="sub-menu">
              <li><a href="/admin"><i class="fa fa-home"></i> 管理首页</a></li>
              <li><a href="/admin-data.html"><i class="fa fa-database"></i> 数据管理</a></li>
              <li class="active"><a href="/admin-flight.html"><i class="fa fa-plane"></i> 飞行数据管理</a></li>
            </ul>
          </li>
          <li class="sidebar-header">用户</li>
          <li>
            <a href="#" id="me-pill-sidebar">未登录</a>
          </li>
          <li>
            <a href="#" id="btn-logout-sidebar">
              <i class="fa fa-sign-out"></i> 退出
            </a>
          </li>
        </ul>
      </nav>

      <!-- 内容容器 -->
      <div class="st-pusher">
        <div class="st-content">
          <!-- 顶部导航栏 -->
          <div class="nav">
            <div class="nav-inner">
              <button data-effect="st-effect-12" class="menu-trigger">☰</button>
              <div class="brand">QAR 安全系统</div>
              <div class="spacer"></div>
              <div id="me-pill" class="pill">
                <span>加载中...</span>
              </div>
            </div>
          </div>

          <div class="container">
      <div class="card" style="margin-bottom: 16px;">
        <div class="card-h">
          <div class="row" style="justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px">
            <div>
              <div class="h2">飞行数据（QAR表格）</div>
              <div class="muted">展示已上传的xlsx飞行数据；支持筛选与时间排序（不包含表头行）</div>
            </div>
            <div class="row" style="gap:8px;flex-wrap:wrap">
              <button class="btn" id="btn-refresh">刷新</button>
              <select class="input" id="file-select" style="width:320px"></select>
            </div>
          </div>
        </div>
        <div class="card-b">
          <div class="filters">
            <div class="col">
              <div class="label">关键词</div>
              <input class="input" id="filter-keyword" placeholder="任意字段/ID..." style="width:220px" />
            </div>
            <div class="col">
              <div class="label">起始日期</div>
              <input class="input" type="date" id="filter-date-start" />
            </div>
            <div class="col">
              <div class="label">截止日期</div>
              <input class="input" type="date" id="filter-date-end" />
            </div>
            <div class="col">
              <div class="label">时间排序</div>
              <div class="row" style="gap:8px">
                <button class="btn" id="btn-time-asc">升序</button>
                <button class="btn" id="btn-time-desc">降序</button>
              </div>
            </div>
            <button class="btn" id="btn-reset-filters">重置筛选</button>
          </div>

          <div class="row" style="gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
            <div class="label">工作表</div>
            <div class="row" id="sheet-tabs" style="gap:8px;flex-wrap:wrap"></div>
            <div class="muted" id="sheet-meta"></div>
          </div>

          <div style="overflow:auto;margin-top:16px">
            <table class="table" id="qar-table">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="empty-msg" class="muted" style="display:none; text-align:center; padding: 20px;">暂无数据</div>
        </div>
      </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="t">提示</div>
      <div class="m"></div>
    </div>

    <script src="/assets/common.js"></script>
    <script src="/assets/transport.js"></script>
    <script src="/assets/admin-flight.js"></script>
  </body>
</html>

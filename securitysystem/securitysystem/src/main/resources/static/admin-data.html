<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>数据管理 - QAR 安全系统</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <link rel="stylesheet" href="/assets/page-animations.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/webgl/three.min.js"></script>
    <script src="/assets/webgl/Detector.js"></script>
    <script src="/assets/clouds.js"></script>
    <script src="/assets/sakura.js"></script>
    <script src="/assets/sidebar.js"></script>
    <script src="/assets/snap.svg-min.js"></script>
    <script src="/assets/svgLoader.js"></script>
    <script src="/assets/page-transition.js?v=4"></script>
    <script src="/assets/classie.js?v=2"></script>
    <script src="/assets/sidebarEffects.js?v=2"></script>
    <style>
      .filters { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-end; flex-wrap: wrap; }
      .filters .col { display: flex; flex-direction: column; gap: 4px; }
      .table th.sortable { cursor: pointer; user-select: none; position: relative; padding-right: 20px; }
      .table th.sortable:after { content: '↕'; position: absolute; right: 4px; opacity: 0.3; }
      .table th.sortable.asc:after { content: '↑'; opacity: 1; }
      .table th.sortable.desc:after { content: '↓'; opacity: 1; }
    </style>
  </head>
  <body>
    <div id="st-container" class="st-container">
      <!-- 侧边栏 -->
      <nav class="st-menu st-effect-12" id="menu-12">
        <h2>QAR 安全系统</h2>
        <ul class="sidebar-menu">
          <li>
            <a href="/workbench">
              <i class="fa fa-dashboard"></i> 工作台
            </a>
          </li>
          <li>
            <a href="/feedback">
              <i class="fa fa-envelope"></i> 反馈与联系
            </a>
          </li>
          <li class="active">
            <a href="#">
              <i class="fa fa-cogs"></i> 管理后台
              <i class="fa fa-angle-down"></i>
            </a>
            <ul class="sub-menu">
              <li><a href="/admin"><i class="fa fa-home"></i> 管理首页</a></li>
              <li class="active"><a href="/admin-data.html"><i class="fa fa-database"></i> 数据管理</a></li>
              <li><a href="/admin-flight.html"><i class="fa fa-plane"></i> 飞行数据管理</a></li>
            </ul>
          </li>
          <li class="sidebar-header">用户</li>
          <li>
            <a href="#" id="me-pill-sidebar">未登录</a>
          </li>
          <li>
            <a href="#" id="btn-logout-sidebar">
              <i class="fa fa-sign-out"></i> 退出
            </a>
          </li>
        </ul>
      </nav>

      <!-- 内容容器 -->
      <div class="st-pusher">
        <div class="st-content">
          <!-- 顶部导航栏 -->
          <div class="nav">
            <div class="nav-inner">
              <button data-effect="st-effect-12" class="menu-trigger">☰</button>
              <div class="brand">QAR 安全系统</div>
              <div class="spacer"></div>
              <div id="me-pill" class="pill">
                <span>加载中...</span>
              </div>
            </div>
          </div>

          <div class="container">
      <div class="card">
        <div class="card-h">
          <div class="row" style="justify-content:space-between">
            <div>
              <div class="h2">人员基础数据管理</div>
              <div class="muted">查看、增加、修改或删除数据库中的人员信息记录</div>
            </div>
            <div class="row">
              <button class="btn primary" id="btn-add-person">添加人员</button>
              <button class="btn" id="btn-refresh-persons">刷新</button>
            </div>
          </div>
        </div>
        <div class="card-b">
          <div class="filters">
            <div class="col">
              <div class="label">关键词搜索</div>
              <input class="input" id="search-keyword" placeholder="姓名/工号/部门..." style="width:200px" />
            </div>
            <div class="col">
              <div class="label">起始日期</div>
              <input class="input" type="date" id="filter-date-start" />
            </div>
            <div class="col">
              <div class="label">截止日期</div>
              <input class="input" type="date" id="filter-date-end" />
            </div>
            <button class="btn" id="btn-reset-filters">重置筛选</button>
          </div>

          <table class="table" id="persons">
            <thead>
              <tr>
                <th class="sortable" data-sort="personNo">工号</th>
                <th class="sortable" data-sort="fullName">姓名</th>
                <th class="sortable" data-sort="airline">航司</th>
                <th class="sortable" data-sort="positionTitle">职位</th>
                <th class="sortable" data-sort="department">部门</th>
                <th class="sortable" data-sort="phone">电话</th>
                <th class="sortable" data-sort="createdAt">创建时间</th>
                <th class="actions">操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <div id="empty-msg" class="muted" style="display:none; text-align:center; padding: 20px;">暂无匹配的数据记录</div>
        </div>
      </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="t">提示</div>
      <div class="m"></div>
    </div>

    <script src="/assets/common.js"></script>
    <script src="/assets/admin-data.js"></script>
  </body>
</html>

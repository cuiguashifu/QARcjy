<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>反馈与联系 - QAR 安全系统</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <link rel="stylesheet" href="/assets/page-animations.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/sidebar.js"></script>
    <script src="/assets/snap.svg-min.js"></script>
    <script src="/assets/svgLoader.js"></script>
    <script src="/assets/page-transition.js?v=4"></script>
    <script src="/assets/classie.js?v=2"></script>
    <script src="/assets/sidebarEffects.js?v=2"></script>
  </head>
  <body>
    <div id="st-container" class="st-container">
      <!-- 侧边栏 -->
      <nav class="st-menu st-effect-12" id="menu-12">
        <h2>QAR 安全系统</h2>
        <ul class="sidebar-menu">
          <li>
            <a href="/workbench">
              <i class="fa fa-dashboard"></i> 工作台
            </a>
          </li>
          <li class="active">
            <a href="/feedback">
              <i class="fa fa-envelope"></i> 反馈与联系
            </a>
          </li>
          <li id="admin-menu" style="display:none">
            <a href="#">
              <i class="fa fa-cogs"></i> 管理后台
              <i class="fa fa-angle-down"></i>
            </a>
            <ul class="sub-menu">
              <li><a href="/admin"><i class="fa fa-home"></i> 管理首页</a></li>
              <li><a href="/admin-data.html"><i class="fa fa-database"></i> 数据管理</a></li>
              <li><a href="/admin-flight.html"><i class="fa fa-plane"></i> 飞行数据管理</a></li>
            </ul>
          </li>
          <li class="sidebar-header">用户</li>
          <li>
            <a href="#" id="me-pill-sidebar">未登录</a>
          </li>
          <li>
            <a href="#" id="btn-logout-sidebar">
              <i class="fa fa-sign-out"></i> 退出
            </a>
          </li>
        </ul>
      </nav>

      <!-- 内容容器 -->
      <div class="st-pusher">
        <div class="st-content">
          <!-- 顶部导航栏 -->
          <div class="nav">
            <div class="nav-inner">
              <button data-effect="st-effect-12" class="menu-trigger">☰</button>
              <div class="brand">QAR 安全系统</div>
              <div class="spacer"></div>
              <div id="me-pill" class="pill">
                <span>加载中...</span>
              </div>
            </div>
          </div>

          <div class="container">
      <div class="grid">
        <div class="card">
          <div class="card-h">
            <div class="h2">提交反馈</div>
            <div class="muted">建议、问题、数据下载异常都可以提交；可关联最近上传的记录 ID 便于排查</div>
          </div>
          <div class="card-b col">
            <div class="split">
              <div style="flex:1">
                <div class="label">类型</div>
                <select class="input" id="type">
                  <option value="bug">Bug</option>
                  <option value="suggestion">建议</option>
                  <option value="data">数据问题</option>
                  <option value="account">账号/权限</option>
                  <option value="other">其他</option>
                </select>
              </div>
              <div style="flex:1">
                <div class="label">联系方式（可选）</div>
                <input class="input" id="contact" placeholder="邮箱/电话/微信" />
              </div>
            </div>
            <div class="col">
              <div class="label">主题（可选）</div>
              <input class="input" id="subject" placeholder="例如：下载解密失败 / 上传后列表不刷新" />
            </div>
            <div class="col">
              <div class="row" style="justify-content:space-between">
                <div class="label">关联记录 ID（可选）</div>
                <div class="row">
                  <button class="btn" id="btn-fill-last" type="button">填入最近上传</button>
                  <button class="btn" id="btn-copy-env" type="button">复制环境信息</button>
                </div>
              </div>
              <input class="input" id="relatedFileId" placeholder="例如：a1b2c3..." />
            </div>
            <div class="col">
              <div class="label">内容</div>
              <textarea class="input" id="message" style="min-height:180px;resize:vertical" placeholder="描述问题复现步骤、期望结果、实际结果。若涉及某条数据请填写关联记录ID。"></textarea>
            </div>
            <button class="btn primary" id="btn-submit">提交反馈</button>
            <div class="muted" id="submit-hint"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-h">
            <div class="row" style="justify-content:space-between">
              <div>
                <div class="h2">我的反馈</div>
                <div class="muted">展示最近提交的反馈与处理状态</div>
              </div>
              <button class="btn" id="btn-refresh">刷新</button>
            </div>
          </div>
          <div class="card-b">
            <table class="table" id="tbl">
              <thead>
                <tr>
                  <th>主题</th>
                  <th>类型</th>
                  <th>状态</th>
                  <th>关联记录</th>
                  <th>更新时间</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <div class="muted" id="empty" style="display:none;margin-top:10px">还没有反馈记录</div>
            <div class="card" style="margin-top:14px;border-style:dashed;box-shadow:none">
              <div class="card-b">
                <div class="h2" style="margin-bottom:6px">快速提示</div>
                <div class="muted">如果你遇到“无权限/解密失败”，建议在反馈中附上：账号、操作路径、关联记录 ID、策略 policy 与时间点。</div>
              </div>
            </div>
          </div>
        </div>
      </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">
      <div class="t">提示</div>
      <div class="m"></div>
    </div>

    <script src="/assets/common.js"></script>
    <script src="/assets/feedback.js"></script>
  </body>
</html>

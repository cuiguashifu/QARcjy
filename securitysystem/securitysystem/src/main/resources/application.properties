spring.application.name=securitysystem
server.port=8101

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=jdbc:h2:mem:securitysystem-db;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.CharSet=UTF-8
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2

app.admin.username=admin
app.admin.password=CAUCqar

app.security.cookieName=QAR_SESSION
app.security.cookieSecure=false
app.security.cookieSameSite=Strict
app.security.sessionTtlMinutes=60

app.person.seedEnabled=true
app.person.seedCsv=classpath:person_seed.csv
